<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikoloz Kenchadze | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: left;
        }

        .container {
            max-width: 1200px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
        }

        /* The "Available for Work" Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            background-color: #111;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #fff;
            border: 1px solid #333;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #4ade80; 
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 12px #4ade80;
            animation: pulse 2s infinite;
        }

        /* Large Bold Text */
        .hero-text {
            font-size: clamp(3.5rem, 12vw, 9rem);
            line-height: 0.85;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 2.5rem;
        }

        /* Small Tagline Text */
        .tagline {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #888; 
            max-width: 550px;
            font-weight: 400;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .hero-text { letter-spacing: -1px; }
            .tagline { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <main class="container">
        <div class="badge">
            <span class="dot"></span>
            Available for Work
        </div>

        <h1 class="hero-text">
            NIKOLOZ<br>
            KENCHADZE©
        </h1>

        <p class="tagline">
            I blend artistry with cutting-edge technology to deliver<br>
            websites that not only look stunning but also drive results.
        </p>
    </main>

</body>
</html>
